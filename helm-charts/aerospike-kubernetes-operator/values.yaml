## Number of operator replicas
replicas: 2

## Operator image
operatorImage:
  repository: aerospike/aerospike-kubernetes-operator
  tag: 4.4.0
  pullPolicy: IfNotPresent

## In case the above image is pulled from a registry that requires
## authentication, a secret containing credentials can be added
## imagePullSecrets:
##   - secret_with_credentials_to_custom_registry
imagePullSecrets: {}

## Create RBAC resources
rbac:
  create: true
  # serviceAccountName: "default"

## Ports
healthPort: 8081
metricsPort: 8443

## Create certificates
certs:
  webhook:
    create: true
    webhookServerCertSecretName: "webhook-server-cert"
  metrics:
    create: false
    metricsServerCertSecretName: "metrics-server-cert"

##  Operator configurations
watchNamespaces: "default,aerospike"

# Namespaces to ignore. Only used for eviction webhook
ignoreNamespaces: "kube-system,kube-node-lease"

# Enable the eviction webhook to safely block Aerospike pod evictions during node maintenance
# Also enables Prometheus metrics: aerospike_ako_eviction_webhook_requests_total (labels: eviction_namespace, decision)
safePodEviction:
  enable: false
  # Eviction webhook timeout in seconds
  timeoutSeconds: "20"

# Grace period to delete/recover failed pods (in seconds)
failedPodGracePeriodSeconds: "60"

# Registry used to pull aerospike-init image
aerospikeKubernetesInitRegistry: "docker.io"

# Namespace in registry used to pull aerospike-init image
aerospikeKubernetesInitRegistryNamespace: "aerospike"

# Name and tag of aerospike-init image
aerospikeKubernetesInitNameTag: "aerospike-kubernetes-init:2.5.1"

## Logging configuration
## These map directly to the zap logger flags registered via opts.BindFlags()
logging:
  ## Development mode: console encoder, DEBUG level, WARN stacktraces, no sampling, DPanic panics
  ## Set to false for production (JSON encoder, INFO level, ERROR stacktraces, sampling enabled)
  development: true

  ## Log level: debug, info, warn, error, dpanic, panic, fatal
  ## Overrides the default set by the development flag
  level: ""

  ## Log encoder: json or console
  ## Overrides the default set by the development flag
  encoder: ""

  ## Stacktrace level: debug, info, warn, error, dpanic, panic, fatal
  ## Log stacktraces at this level and above
  stacktraceLevel: ""

  ## Time encoding: epoch, millis, nano, iso8601, rfc3339, rfc3339nano
  timeEncoding: ""

## Resources - limits / requests
resources:
  limits:
    cpu: 400m
    memory: 512Mi
  requests:
    cpu: 10m
    memory: 64Mi

## Affinity rules
affinity: {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: kubernetes.io/hostname
  #         operator: In
  #         values:
  #         - <Kubernetes Host>

## Extra environment variables that will be passed into the operator pods
extraEnv: {}

## Node selector
nodeSelector: {}

## Tolerations
tolerations: []

## Deployment annotations and labels
## Deployment labels are inherited by the pods automatically
annotations: {}
labels: {}

## Pod annotations and labels
podAnnotations: {}
podLabels: {}

## Service configuration
metricsService:
  # labels: {}
  # annotations: {}
  port: 8443
  type: ClusterIP

webhookService:
  # labels: {}
  # annotations: {}
  port: 443
  targetPort: 9443
  type: ClusterIP

## Pod security context
podSecurityContext: {}

## Container security context
securityContext:
  allowPrivilegeEscalation: false

livenessProbe:
   initialDelaySeconds: 15
   periodSeconds: 20
   timeoutSeconds: 1
   successThreshold: 1
   failureThreshold: 3
readinessProbe:
   initialDelaySeconds: 5
   periodSeconds: 10
   timeoutSeconds: 1
   successThreshold: 1
   failureThreshold: 3
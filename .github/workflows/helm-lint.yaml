name: helm-lint

on:
  push:
    branches:
      - master
    paths:
      - 'helm-charts/**'
      - '.github/workflows/helm-lint.yaml'
  pull_request:
    branches:
      - master
    paths:
      - 'helm-charts/**'
      - '.github/workflows/helm-lint.yaml'

jobs:
  helm-lint:
    name: helm-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - aerospike-backup
          - aerospike-backup-service
          - aerospike-cluster
          - aerospike-kubernetes-operator
          - aerospike-restore
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Run helm lint on ${{ matrix.chart }}
        run: helm lint helm-charts/${{ matrix.chart }}

      - name: Run helm template on ${{ matrix.chart }}
        run: helm template test-release helm-charts/${{ matrix.chart }} > /dev/null

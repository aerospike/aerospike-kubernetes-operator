name: helm-lint

on:
  push:
    branches:
      - master
    paths:
      - 'helm-charts/**'
      - '.github/workflows/helm-lint.yaml'
  pull_request:
    branches:
      - master
    paths:
      - 'helm-charts/**'
      - '.github/workflows/helm-lint.yaml'

jobs:
  helm-lint:
    name: helm-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - aerospike-backup
          - aerospike-backup-service
          - aerospike-cluster
          - aerospike-kubernetes-operator
          - aerospike-restore
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Run helm lint on ${{ matrix.chart }}
        run: helm lint helm-charts/${{ matrix.chart }}

      - name: Run helm template on ${{ matrix.chart }}
        run: helm template test-release helm-charts/${{ matrix.chart }} > /dev/null

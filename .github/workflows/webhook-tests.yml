name: Eviction Webhook ENV Test Suite

on:
  push:
    tags:
      - v*
    branches:
      - master
  workflow_dispatch: # Allows manual triggering
  pull_request:
    branches:
      - master
      - 'enhancement/**'
      - 'bugfix/**'
    paths:  # Only run on PRs when eviction webhook or cluster-related code or tests change
      - 'internal/webhook/**'
      - 'api/v1/**'
      - 'test/envtests/**'
      - '.github/workflows/webhook-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ["1.35", "1.23"]
    name: EnvTest (k8s ${{ matrix.k8s-version }})
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
      - name: Setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # Install Ginkgo CLI (so `go run` not needed)
      - name: Install Ginkgo CLI
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

      # Run your env-test target
      - name: Run EnvTest Suite
        run: make env-test ENVTEST_K8S_VERSION=${{ matrix.k8s-version }}
apiVersion: asdb.aerospike.com/v1
kind: AerospikeCluster
metadata:
  name: aerocluster
  namespace: aerospike

spec:
  size: 2
  paused: false
  # This sample uses the new YAML map format for aerospikeConfig (server >= 9.0.0).
  # Replace with the actual 9.0+ image tag for your environment.
  image: tanmayj10/aerospike-server-enterprise:8.1.2.0
  rackConfig:
    namespaces:
      - test
    racks:
      - id: 1
        # Change to the zone for your k8s cluster.
        zone: us-west1-a
        aerospikeConfig:
          namespaces:
            abc:
              replication-factor: 2
              storage-engine:
                type: device
                devices:
                  - /test/dev/xvdf1
            xyz:
              replication-factor: 1
              storage-engine:
                type: memory
                data-size: 1073741824
      - id: 2
        # Change to the zone for your k8s cluster.
        zone: us-west1-b
        aerospikeConfig:
          namespaces:
            abc:
              replication-factor: 2
              storage-engine:
                type: device
                devices:
                  - /test/dev/xvdf1
            xyz:
              replication-factor: 1
              storage-engine:
                type: memory
                data-size: 1073741824

  storage:
    filesystemVolumePolicy:
      cascadeDelete: true
      initMethod: deleteFiles
    blockVolumePolicy:
      cascadeDelete: true
    volumes:
      - name: workdir
        aerospike:
          path: /opt/aerospike
        source:
          persistentVolume:
            storageClass: ssd
            volumeMode: Filesystem
            size: 1Gi
      - name: ns
        aerospike:
          path: /test/dev/xvdf
        source:
          persistentVolume:
            storageClass: ssd
            volumeMode: Block
            size: 5Gi
      - name: ns1
        aerospike:
          path: /test/dev/xvdf1
        source:
          persistentVolume:
            storageClass: ssd
            volumeMode: Block
            size: 5Gi
      - name: aerospike-config-secret
        source:
          secret:
            secretName: aerospike-secret
        aerospike:
          path: /etc/aerospike/secret

  podSpec:
    multiPodPerHost: true
    aerospikeInitContainer:
      imageRegistryNamespace: tanmayj10
      imageNameAndTag: aerospike-kubernetes-init:2.6.0-dev5

  aerospikeAccessControl:
    users:
      - name: admin
        secretName: auth-secret
        roles:
          - sys-admin
          - user-admin

  aerospikeConfig:
    service:
      cgroup-mem-tracking: true
      feature-key-file: /etc/aerospike/secret/features.conf
    security: {}

    network:
      service:
        port: 3000
      heartbeat:
        port: 3002
      fabric:
        port: 3001

    namespaces:
      test:
        replication-factor: 2
        storage-engine:
          type: device
          devices:
            - /test/dev/xvdf
      testMem:
        replication-factor: 1
        storage-engine:
          type: memory
          data-size: 1073741824
